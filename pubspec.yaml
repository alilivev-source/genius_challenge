name: genius_challenge
description: Genius Challenge Game
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0

  # الإعلانات
  google_mobile_ads: ^5.1.0

  # حفظ البيانات محلياً
  shared_preferences: ^2.2.3

  # مشاركة السؤال
  share_plus: ^10.0.2

  # فتح روابط خارجية (واتساب وغيره)
  url_launcher: ^6.3.0

  # أيقونات iOS
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/questions/